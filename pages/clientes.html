<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Clientes - QR</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- QRCode.js para generar códigos QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #141b2d;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #e8edf5;
            --text-secondary: #8aa3c9;
            --accent: #4a7cf7;
            --accent-glow: rgba(74, 124, 247, 0.3);
            --success: #51cf66;
            --danger: #ff6b6b;
            --warning: #ffd700;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-left .icon {
            font-size: 2rem;
            background: var(--accent);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .header-left h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge-firebase {
            background: rgba(255, 200, 0, 0.12);
            padding: 6px 14px;
            border-radius: 60px;
            color: var(--warning);
            font-size: 0.75rem;
            border: 1px solid rgba(255, 200, 0, 0.2);
        }
        .btn-volver {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 60px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .btn-volver:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 16px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-color);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .form-group textarea {
            border-radius: 16px;
            resize: vertical;
            min-height: 60px;
        }
        .form-group select option {
            background: var(--bg-secondary);
        }

        .btn {
            padding: 12px 28px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-primary:hover {
            background: #5f8cff;
            transform: translateY(-2px);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover {
            background: #63d976;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: #ff8787;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
        }

        .btn-block {
            width: 100%;
        }

        /* QR */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 16px;
        }
        #qrCode {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            display: inline-block;
        }
        #qrCode img,
        #qrCode canvas {
            display: block !important;
        }
        .qr-info {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .qr-info strong {
            color: var(--text-primary);
        }

        /* Tabla de clientes */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 16px;
        }
        .table-wrapper table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .table-wrapper th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table-wrapper td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }
        .table-wrapper tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }
        .table-wrapper .qr-mini {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .table-wrapper .qr-mini canvas,
        .table-wrapper .qr-mini img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .badge-status {
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-status.activo {
            background: rgba(81, 207, 102, 0.15);
            color: var(--success);
        }
        .badge-status.inactivo {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
        }

        .acciones-tabla {
            display: flex;
            gap: 6px;
        }
        .acciones-tabla button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        .acciones-tabla button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        .acciones-tabla button.eliminar:hover {
            color: var(--danger);
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-color);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            min-width: 150px;
        }
        .search-box input:focus {
            border-color: var(--accent);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.show {
            display: flex;
        }
        .loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            font-size: 0.9rem;
        }
        .alert.show {
            display: block;
        }
        .alert-success {
            background: rgba(81, 207, 102, 0.12);
            border: 1px solid rgba(81, 207, 102, 0.2);
            color: var(--success);
        }
        .alert-danger {
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: var(--danger);
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 16px;
            }
            .header-left h1 {
                font-size: 1.2rem;
            }
            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span style="color:#fff;">Guardando en Firebase...</span>
    </div>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div class="icon">👥</div>
                <h1>Gestión de Clientes</h1>
            </div>
            <div class="header-right">
                <span class="badge-firebase">🔥 Firebase</span>
                <span class="badge-firebase" id="userNameBadge">👤 Vendedor</span>
                <a href="../vendedor.html" class="btn-volver">← Volver</a>
            </div>
        </div>

        <!-- FORMULARIO Y QR -->
        <div class="grid-2">

            <!-- FORMULARIO -->
            <div class="card">
                <div class="card-title">📝 Registrar Cliente</div>

                <div id="alertMessage" class="alert"></div>

                <div class="form-group">
                    <label>📛 Nombre completo *</label>
                    <input type="text" id="clienteNombre" placeholder="Ej: María González" />
                </div>

                <div class="form-group">
                    <label>📧 Correo electrónico</label>
                    <input type="email" id="clienteEmail" placeholder="cliente@correo.com" />
                </div>

                <div class="form-group">
                    <label>📱 Teléfono *</label>
                    <input type="tel" id="clienteTelefono" placeholder="Ej: 5512345678" />
                </div>

                <div class="form-group">
                    <label>📍 Dirección</label>
                    <textarea id="clienteDireccion" placeholder="Calle, número, colonia, ciudad"></textarea>
                </div>

                <div class="form-group">
                    <label>🏷️ Tipo de cliente</label>
                    <select id="clienteTipo">
                        <option value="regular">Regular</option>
                        <option value="premium">Premium</option>
                        <option value="corporativo">Corporativo</option>
                        <option value="vip">VIP</option>
                    </select>
                </div>

                <div class="form-group" style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button class="btn btn-primary" id="btnRegistrar" style="flex:1;">✅ Registrar Cliente</button>
                    <button class="btn btn-outline" id="btnLimpiar" style="flex:0.5;">🗑️ Limpiar</button>
                </div>
            </div>

            <!-- QR GENERADO -->
            <div class="card">
                <div class="card-title">📱 QR del Cliente</div>
                <div class="qr-container">
                    <div id="qrCode"></div>
                    <div class="qr-info">
                        <strong id="qrNombre">---</strong><br />
                        <span id="qrId">ID: ---</span><br />
                        <span id="qrTelefono">📱 ---</span>
                    </div>
                    <button class="btn btn-success" id="btnDescargarQR" style="width:100%;">⬇️ Descargar QR</button>
                    <button class="btn btn-outline" id="btnImprimirQR" style="width:100%;">🖨️ Imprimir QR</button>
                </div>
                <div style="margin-top:12px; padding:12px; background:rgba(255,255,255,0.03); border-radius:12px; text-align:center; font-size:0.85rem; color:var(--text-secondary);">
                    💡 El QR se genera automáticamente al registrar un cliente
                </div>
            </div>
        </div>

        <!-- LISTA DE CLIENTES -->
        <div class="card" style="margin-top:24px;">
            <div class="card-title" style="justify-content:space-between; flex-wrap:wrap; gap:12px;">
                <span>📋 Clientes Registrados</span>
                <span style="font-size:0.85rem; color:var(--text-secondary);" id="totalClientes">Total: 0</span>
            </div>

            <div class="search-box">
                <input type="text" id="buscarCliente" placeholder="🔍 Buscar por nombre, teléfono o correo..." />
                <button class="btn btn-outline" id="btnRefrescar" style="white-space:nowrap;">🔄 Refrescar</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>QR</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Correo</th>
                            <th>Tipo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaClientes">
                        <tr>
                            <td colspan="7" style="text-align:center; color:var(--text-secondary); padding:30px;">
                                ⏳ Cargando clientes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Firebase Config -->
    <script src="../assets/js/firebase-config.js"></script>

    <script>

            'use strict';

            // ===== VERIFICAR SESIÓN =====
            const userId = localStorage.getItem('userId');

            if (!userId) {
                alert('⛔ Sesión no válida.');
                window.location.href = '../index.html';
                return;
            }

            // ===== ELEMENTOS =====
            const nombreInput = document.getElementById('clienteNombre');

            const direccionInput = document.getElementById('clienteDireccion');
            const tipoSelect = document.getElementById('clienteTipo');
            const btnRegistrar = document.getElementById('btnRegistrar');
            const btnLimpiar = document.getElementById('btnLimpiar');
            const btnRefrescar = document.getElementById('btnRefrescar');
            const buscarInput = document.getElementById('buscarCliente');
            const tablaClientes = document.getElementById('tablaClientes');
            const totalClientes = document.getElementById('totalClientes');
            const qrContainer = document.getElementById('qrCode');
            const qrNombre = document.getElementById('qrNombre');
            const qrId = document.getElementById('qrId');
            const qrTelefono = document.getElementById('qrTelefono');
            const btnDescargarQR = document.getElementById('btnDescargarQR');
            const btnImprimirQR = document.getElementById('btnImprimirQR');
            const alertMessage = document.getElementById('alertMessage');
            const loadingOverlay = document.getElementById('loadingOverlay');

            let qrInstance = null;
            let clienteActual = null;
            let todosClientes = [];

            // ===== FUNCIONES =====

                setTimeout(() => {
